<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Discord Media Exporter</title>
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div>
          <p class="eyebrow">Discord Media Exporter</p>
          <h1>表示中メディア</h1>
        </div>
        <span id="candidate-count" class="count" aria-live="polite">0件</span>
      </header>

      <p class="description">
        現在見えている添付を収集します。Discordをスクロールして繰り返すと、同じチャンネルの結果へ追加できます。画面外へ自動移動しません。
      </p>

      <button id="scan-button" class="button button-primary" type="button">
        この表示範囲を確認
      </button>

      <section id="results" class="results" hidden>
        <div class="toolbar" aria-label="メディアの絞り込み">
          <label class="filter-label" for="kind-filter">種類</label>
          <select id="kind-filter">
            <option value="all">すべて</option>
            <option value="image">画像</option>
            <option value="video">動画</option>
            <option value="file">その他</option>
          </select>
          <button id="select-all-button" class="button button-quiet" type="button">
            表示中を選択
          </button>
          <button id="clear-button" class="button button-quiet" type="button">解除</button>
          <button id="clear-collection-button" class="button button-quiet" type="button">
            収集をクリア
          </button>
        </div>

        <ul id="candidate-list" class="candidate-list" aria-label="メディア候補"></ul>

        <div class="download-panel">
          <p id="selection-summary">0件を選択中</p>
          <div class="save-actions">
            <button id="download-button" class="button button-primary" type="button" disabled>
              個別に保存
            </button>
            <button id="zip-button" class="button button-secondary" type="button" disabled>
              ZIPにまとめて保存
            </button>
          </div>
          <p class="zip-permission-note">
            ZIP保存時だけ、Discord CDNから内容を取得する追加権限を確認します。最大100件・合計100
            MiBです。
          </p>
        </div>
      </section>

      <section id="zip-progress" class="progress" aria-live="polite" hidden>
        <h2>ZIP出力状況</h2>
        <p id="zip-progress-summary"></p>
        <p id="zip-progress-detail" class="zip-progress-detail"></p>
        <button id="zip-cancel-button" class="button button-danger" type="button" hidden>
          ZIP出力をキャンセル
        </button>
      </section>

      <section id="progress" class="progress" aria-live="polite" hidden>
        <h2>ダウンロード状況</h2>
        <p id="progress-summary"></p>
        <ul id="progress-list" class="progress-list" aria-label="ファイルごとの状態"></ul>
      </section>

      <p id="notice" class="notice" role="status" aria-live="polite"></p>
      <p class="legal-note">保存する権利・許可のあるメディアだけを選択してください。</p>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
