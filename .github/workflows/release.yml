name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out the release commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.7.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify and package the extension
        run: pnpm release:prepare

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::package.json must contain an x.y.z release version: $version"
            exit 1
          fi

          tag="v${version}"
          archive=".output/discord-media-exporter-${version}-chrome.zip"
          checksum="${archive}.sha256"

          test -f "$archive"
          test -f "$checksum"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
          echo "checksum=$checksum" >> "$GITHUB_OUTPUT"

      - name: Ensure the version has not been released
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::Release $TAG already exists. Bump package.json before merging to main."
            exit 1
          fi

          if git rev-parse --verify --quiet "refs/tags/$TAG" >/dev/null; then
            echo "::error::Tag $TAG already exists. Bump package.json before merging to main."
            exit 1
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
          ARCHIVE: ${{ steps.release.outputs.archive }}
          CHECKSUM: ${{ steps.release.outputs.checksum }}
        run: |
          gh release create "$TAG" \
            "$ARCHIVE" \
            "$CHECKSUM" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Discord Media Exporter $VERSION" \
            --generate-notes \
            --latest
