  error_ZIP_FAILED: The ZIP could not be created.
  error_SAVE_FAILED: Saving the generated ZIP could not be started.
  error_DOWNLOAD_NO_SPACE: The ZIP could not be saved because the destination disk is full.
  error_CONTEXT_LOST: The ZIP state could not be restored. Run the export again.
  error_COLLECTOR_START_INTERRUPTED: Starting collection was interrupted.
  error_COLLECTION_REGISTER_FAILED: The collected results could not be registered.
  error_COLLECTOR_START_FAILED: Collection could not be started.
  error_NOT_DISCORD_CHANNEL: Open a Discord channel page.
  error_MESSAGE_VIEWPORT_NOT_FOUND: The message display area could not be identified.
