  error_CANDIDATE_EXPIRED: The media candidates have expired. Scan again.
  error_CANDIDATE_REVALIDATION_FAILED: A candidate could not be revalidated.
  error_DOWNLOAD_START_FAILED: The download could not be started.
  error_DOWNLOAD_INTERRUPTED: The download was interrupted{reason}.
  error_DOWNLOAD_STATE_RESTORE_FAILED: The download state could not be restored.
  error_DOWNLOAD_HISTORY_MISSING: The download history could not be checked.
  error_ZIP_SELECTION_REQUIRED: Select media to save in the ZIP.
  error_ZIP_FILENAME_CONFLICT: A unique filename could not be created inside the ZIP.
  error_ZIP_ALREADY_ACTIVE: A ZIP export is already in progress.
  error_ZIP_ACTIVE_CLEAR: Wait for the ZIP export to finish before clearing.
  error_ZIP_ACTIVE_DOWNLOAD: Wait for the ZIP export to finish before saving.
  error_DOWNLOADS_ACTIVE_ZIP: Wait for individual downloads to finish before creating a ZIP.
